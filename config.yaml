name: "grandMA3 MCP Server"
description: "MCP server exposing grandMA3 documentation and console control over SSE"
version: "1.0.0"
slug: "grandma3_mcp_server"
init: false
arch:
  - aarch64
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "MCP SSE endpoint"
options:
  ma3_host: "192.168.1.100"
  ma3_port: 30000
  log_level: "info"
schema:
  ma3_host: str
  ma3_port: int
  log_level: str
map:
  - config:rw
homeassistant_api: false
